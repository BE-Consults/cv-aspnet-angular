<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy rounded square matches the site accent and the inspect-toggle button. -->
  <rect width="64" height="64" rx="14" ry="14" fill="#15314a"/>
  <!-- Two braces with manual x positioning so the gap reads cleanly at 16x16. -->
  <text x="22" y="32" text-anchor="middle" dominant-baseline="central"
        font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="38" font-weight="700" fill="white">{</text>
  <text x="42" y="32" text-anchor="middle" dominant-baseline="central"
        font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace"
        font-size="38" font-weight="700" fill="white">}</text>
</svg>
