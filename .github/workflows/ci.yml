# =========================================================================
# Continuous integration.
#
# Builds both halves on every push to main and every pull request.
# Catches breakage before it reaches the live site.
#
# Two parallel jobs so a back-end change does not wait on the front end
# and vice versa.
# =========================================================================

name: CI

# All actions pinned to majors that natively target the Node 24 runtime
# (checkout@v6, setup-node@v5, setup-dotnet@v5, pnpm/action-setup@v6).
# This removes the Node 20 deprecation warnings without needing the
# FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 compatibility flag.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Build Angular front end
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec ng build

  backend:
    name: Build ASP.NET Core back end
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release
